scrape_configs:
    - job_name: 'prometheus'
      scrape_interval: 10s

    - job_name: 'tempo'
      scrape_interval: 10s
      scheme: http
      static_configs:
          - targets: ['tempo:3200']

    - job_name: storage-job
      metrics_path: /metrics
      scrape_interval: 10s
      scheme: http
      static_configs:
          - targets: ['seaweedfs:9324']

    - job_name: storage-job-bucket
      scrape_interval: 10s
      metrics_path: /metrics
      scheme: http
      static_configs:
          - targets: ['seaweedfs:9324']

    - job_name: postgres-exporter
      scrape_interval: 10s
      scheme: http
      static_configs:
          - targets: ['postgres-exporter:9187']

    - job_name: 'backend:syst_stats'
      scrape_interval: 10s
      metrics_path: /metrics
      static_configs:
          - targets: ['main:3000']

    - job_name: 'backend:traces'
      scrape_interval: 10s
      metrics_path: /metrics
      static_configs:
          - targets: ['main:9464']
