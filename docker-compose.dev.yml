services:
    base:
        image: kleinkram-base
        build:
            context: .
            dockerfile: docker/base.Dockerfile

    api-server:
        image: rslethz/kleinkram:api-server-dev
        container_name: kleinkram-api-server-dev

        build:
            context: .
            dockerfile: docker/backend.Dockerfile
            target: production

        ports:
            - 127.0.0.1:${SERVER_PORT}:${SERVER_PORT}

        env_file:
            - .env

        volumes:
            - swagger-spec:/usr/src/app/backend/docs

        networks:
            - webnet
            - privatenet

        environment:
            DEVBUILD: 'false'
            REDIS_HOST: redis

        depends_on:
            - database
            - redis

    database:
        image: postgres:17
        container_name: kleinkram-postgres-dev

        ports:
            - '5432:5432'

        networks:
            - privatenet

        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}

        volumes:
            - postgres_db_data:/var/lib/postgresql/data

    minio:
        image: minio/minio
        container_name: kleinkram-minio-dev

        volumes:
            - minio_data:/data
            - ./docker/minio-entrypoint.sh:/docker-entrypoint.sh:ro

        environment:
            MINIO_ROOT_USER: ${MINIO_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
            MINIO_PROMETHEUS_AUTH_TYPE: 'public'
            MINIO_DATA_BUCKET_NAME: ${MINIO_DATA_BUCKET_NAME}
            MINIO_DB_BUCKET_NAME: ${MINIO_DB_BUCKET_NAME}
            MINIO_ARTIFACTS_BUCKET_NAME: ${MINIO_ARTIFACTS_BUCKET_NAME}
            MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
            MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}

        entrypoint: ['/docker-entrypoint.sh']

        ports:
            - '127.0.0.1:9000:9000' # file storage
            - '127.0.0.1:9001:9001' # management console
        networks:
            - webnet
            - privatenet

    frontend:
        image: rslethz/kleinkram:frontend-dev
        container_name: kleinkram-frontend-dev

        build:
            context: .
            dockerfile: docker/frontend.Dockerfile
            target: production
            args:
                - BACKEND_URL=${BACKEND_URL}
                - GIT_BRANCH=${GIT_BRANCH}
                - GIT_COMMIT=${GIT_COMMIT}

        volumes:
            - ./frontend:/app/frontend
            - ./packages:/app/packages
            - /app/frontend/node_modules

        ports:
            - '8003:80'

        networks:
            - webnet

    redis:
        image: redis:latest
        container_name: kleinkram-redis-dev
        ports:
            - '6379:6379'
        networks:
            - privatenet

    queue-consumer:
        image: rslethz/kleinkram:queue-consumer-dev
        container_name: kleinkram-queue-consumer-dev
        build:
            context: .
            dockerfile: docker/queue-consumer.Dockerfile
            target: production
        env_file:
            - .env
        networks:
            - privatenet
        depends_on:
            - database
            - loki
        volumes:
            # mount docker socket to access docker from within the container
            - /var/run/docker.sock:/var/run/docker.sock
            - ./google-service-account.json:/app/queueConsumer/google-service-account.json:ro
        # Add docker group to allow access to docker socket
        group_add:
            - ${DOCKER_GID:-999}
    prometheus:
        image: prom/prometheus
        container_name: kleinkram-prometheus-dev
        volumes:
            - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
            - logging-prometheus-storage:/prometheus
        command:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--web.enable-remote-write-receiver'
            - '--enable-feature=exemplar-storage'
            - '--enable-feature=native-histograms'
        ports:
            - '9090:9090'
        networks:
            - privatenet

    tempo:
        user: '0:0'
        image: grafana/tempo:latest
        container_name: kleinkram-tempo-dev
        command: ['-config.file=/etc/tempo/tempo.yml']
        volumes:
            - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml
            - logging-tempo-data:/tmp/tempo
        ports:
            - '3200' # tempo
            - '4317' # otlp grpc
            - '4318' # otlp http
        networks:
            - privatenet

    loki:
        image: grafana/loki
        container_name: kleinkram-loki-dev
        ports:
            - '3100:3100'
        command:
            - --config.file=/mnt/config/loki-config.yml
            - -log.level=error
        volumes:
            - ./observability/loki/loki-config.yml:/mnt/config/loki-config.yml:ro
        networks:
            - privatenet

    grafana:
        image: grafana/grafana
        container_name: kleinkram-grafana-dev
        volumes:
            - logging-grafana-storage:/var/lib/grafana
            - ./observability/grafana/provisioning:/etc/grafana/provisioning

        environment:
            - GF_LOG_LEVEL=critical
        ports:
            - '9050:3000' # localhost:9050 for accessing grafana
        networks:
            - privatenet

    documentation:
        depends_on:
            - api-server
        image: rslethz/kleinkram:docs-dev
        container_name: kleinkram-documentation-dev
        volumes:
            - swagger-spec:/app/src/docs/
        build:
            context: .
            dockerfile: docker/docs.Dockerfile
            target: production
            args:
                - MODE=staging
        ports:
            - '4000:80'

    artifact-uploader:
        image: rslethz/kleinkram:artifact-uploader-dev
        build:
            context: queueConsumer/src/artifactUpload
            dockerfile: Dockerfile

volumes:
    postgres_db_data:
    minio_data:
    logging-prometheus-storage:
    logging-grafana-storage:
    logging-tempo-data:
    swagger-spec:

networks:
    webnet:
    privatenet:
