exclude: 'yarn\.lock|pnpm-lock\.yaml|frontend/src/build\.ts'
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-docstring-first
      - id: check-yaml
      - id: end-of-file-fixer
      - id: requirements-txt-fixer
      - id: trailing-whitespace

  - repo: https://github.com/psf/black
    rev: 25.11.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        files: ^cli/
        args: [--config, cli/setup.cfg]

  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        files: ^cli/
        args: [--sl]

  - repo: local
    hooks:
      - id: eslinthe
        name: eslint
        entry: env NODE_OPTIONS='--max-old-space-size=8192' node_modules/.bin/eslint --fix --cache --config eslint.config.mjs
        language: system
        types_or: [javascript, ts, vue]

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: node_modules/.bin/prettier --write --cache --experimental-cli
        language: system
        types_or: [css, javascript, ts, tsx, json, yaml, markdown, vue]
