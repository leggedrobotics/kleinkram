name: Lint

on:
    push:
        branches:
            - dev
        paths:
            - 'cli/**'

jobs:
    lint:
        runs-on: [self-hosted, linux]
        steps:
            - uses: actions/checkout@v6
            - name: Install python3-venv
              run: sudo apt update && sudo apt install -y python3.10-venv
            - uses: psf/black@stable
