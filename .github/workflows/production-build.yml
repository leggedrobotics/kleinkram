name: Docker Image CI (GrandTour Datasets)

on:
    push:
        branches: ['main']

jobs:
    production-build:
        environment: 'BuildEnv'
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - name: Login to DockerHub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - working-directory: .
              name: Build the Docker compose
              run: docker compose -f docker-compose.prod.yml build
              env:
                  BACKEND_URL: ${{ vars.BACKEND_URL }}
                  GIT_BRANCH: ${{ github.ref_name }}
                  GIT_COMMIT: ${{ github.sha }}
                  S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
            - name: Extract project version
              id: get_version
              run: echo "version=v$(jq -r .version package.json)" >> $GITHUB_OUTPUT
            - working-directory: .
              name: push the docker image
              run: docker compose -f docker-compose.prod.yml push api-server frontend queue-consumer documentation artifact-uploader
            - name: Tag and push versioned images
              run: |
                  docker tag rslethz/kleinkram:api-server-latest rslethz/kleinkram:api-server-${{ steps.get_version.outputs.version }}
                  docker push rslethz/kleinkram:api-server-${{ steps.get_version.outputs.version }}
                  docker tag rslethz/kleinkram:frontend-latest rslethz/kleinkram:frontend-${{ steps.get_version.outputs.version }}
                  docker push rslethz/kleinkram:frontend-${{ steps.get_version.outputs.version }}
                  docker tag rslethz/kleinkram:queue-consumer-latest rslethz/kleinkram:queue-consumer-${{ steps.get_version.outputs.version }}
                  docker push rslethz/kleinkram:queue-consumer-${{ steps.get_version.outputs.version }}
                  docker tag rslethz/kleinkram:docs-latest rslethz/kleinkram:docs-${{ steps.get_version.outputs.version }}
                  docker push rslethz/kleinkram:docs-${{ steps.get_version.outputs.version }}
                  docker tag rslethz/kleinkram:artifact-uploader-latest rslethz/kleinkram:artifact-uploader-${{ steps.get_version.outputs.version }}
                  docker push rslethz/kleinkram:artifact-uploader-${{ steps.get_version.outputs.version }}
